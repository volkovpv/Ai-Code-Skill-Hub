# Vendor-specific adapter for OpenAI harnesses (Codex).
# Other harnesses ignore this file; keep SKILL.md vendor-neutral.
# Note: the in-house YAML subset has no multiline scalars, so default_prompt is one line.
interface:
  display_name: Hexagonal Service
  short_description: Language-, framework- and project-neutral ports-and-adapters canon covering the major approaches; the adoption strategy is declared in the host project's rules.
  default_prompt: "Apply the hexagonal-service skill: a language- and framework-agnostic, project-neutral ports-and-adapters (hexagonal architecture) canon. Activate it when structuring a module, port, use case, or adapter, when deciding where code belongs, or when reviewing boundaries and error flow. Enforce the invariant core: every external interaction crosses a port the app defines, no source dependency from the app on actors or technology, driven actors swappable at runtime via the configurator, technology-neutral port contracts, test doubles at every port, and the single error path (typed domain errors from one root, a foreign error wrapped exactly once at the driven adapter with its cause, bubbling untouched, logged with the stack and mapped to transport exactly once in the boundary filter). The skill covers multiple approaches (strict two-layer, layered, onion/clean, DDD, CQRS) but never picks the adoption strategy: the concrete strategy (module-first, domain-first, layer-first, ports-first layout; walking-skeleton or strangler rollout) must be declared in the host project's rules, which always take precedence over the skill. Do not prescribe language or framework mechanics (those live in language and framework skills), and do not force the skill onto requests unrelated to service architecture."
