# Vendor-specific adapter for OpenAI harnesses (Codex).
# Other harnesses ignore this file; keep SKILL.md vendor-neutral.
# Note: the in-house YAML subset has no multiline scalars, so default_prompt is one line.
interface:
  display_name: TypeScript + NestJS
  short_description: NestJS-specific conventions for hexagonal services - tokens, providers, HTTP boundary, config, testing.
  default_prompt: "Apply the typescript-nestjs skill: NestJS-specific rules for services built on the hexagonal architecture. Activate it when writing, reviewing, or refactoring NestJS code - modules, providers, controllers, pipes, guards, interceptors, exception filters, config namespaces, or NestJS tests. Enforce named unique-symbol DI tokens (never string or inline-Symbol tokens), plain use-case classes assembled by factory providers, controllers as pure mappers behind a global ValidationPipe, exception filters that log once and map domain errors to HTTP once with masked 5xx, fail-closed env validation behind @nestjs/config, and @nestjs/testing with overrideProvider at the token. Layer and error-flow rules come from the hexagonal-service skill and language rules from typescript-coding; do not force this skill onto non-NestJS requests. Project instructions always take precedence over the skill."
