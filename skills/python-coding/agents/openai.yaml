# Vendor-specific adapter for OpenAI harnesses (Codex).
# Other harnesses ignore this file; keep SKILL.md vendor-neutral.
# Note: the in-house YAML subset has no multiline scalars, so default_prompt is one line.
interface:
  display_name: Python Coding (universal)
  short_description: Universal strictly-typed, secure-by-default Python coding standard, free of framework and architecture assumptions.
  default_prompt: "Apply the python-coding skill: a universal Python coding standard with no framework, architecture, or library assumptions. Activate it when writing, reviewing, or refactoring any .py code. Enforce a strict type checker (mypy --strict or pyright strict) with full annotations on the public surface, no Any and no unproven cast, closed sets as enums or Literal unions, NewType-branded ids, frozen dataclasses and read-only collection parameters, tagged unions with exhaustive match closed by assert_never, validated (never cast) boundary data, secure-by-default code (parameterized SQL, argument-list subprocess without shell=True, no eval/exec on data, no pickle or yaml.load on untrusted input, path containment checks, secrets module with constant-time comparison, TLS verification never disabled), structured concurrency (asyncio.TaskGroup, timeouts on every external await, no fire-and-forget tasks, no blocking calls on the event loop, locks that never rely on the GIL), timezone-aware UTC datetimes (never utcnow), Decimal for money, context-managed resources, narrowest except clauses with raise-from at most once at the source, explicit boolean expressions and None-checks instead of or-defaults, centralized os.environ access, no print or assert-as-validation in shipped code, no type or lint suppressions, modern version-gated syntax (PEP 695 generics and type aliases, TypeIs, t-strings and lazy annotations on 3.14), and tests shipped in the same change. Do not apply architecture-specific rules (they live in the hexagonal-service skill), and do not force the skill onto non-Python requests. Project instructions always take precedence over the skill."
