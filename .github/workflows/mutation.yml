name: Mutation testing

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

# Actions are pinned by commit SHA, not by tag: tags are mutable, SHAs are not.

jobs:
  critical-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install locked development tools
        run: |
          python -m pip install uv==0.11.28
          uv sync --locked

      - name: Mutate security, lockfile, installer, yamlio, validator, and the skill analyzers
        run: uv run mutmut run

      # The threshold is backed by full reference runs of both scope halves:
      # the library modules (2034 mutants, score 78.6%) and the skill
      # analyzers (1647 mutants, score ~82%), each with a >=3 pp margin for
      # equivalent-mutant noise; the survivor-triage discipline lives in the
      # coverage/mutation section of __test__/README.md.
      - name: Enforce mutation score
        run: |
          uv run mutmut export-cicd-stats
          uv run python scripts/check_mutation_score.py mutants/mutmut-cicd-stats.json --minimum 75

      - name: Show surviving mutants
        if: always()
        run: uv run mutmut results
