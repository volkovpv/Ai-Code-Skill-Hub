name: Release

# Auto-release modelled after yandexdisk-dsm-app, adapted for a library with no
# binary build step.
#
# Branches: releases are built ONLY from main (push = direct commit or merged
# PR); test and dev branches never release — this workflow does not even run
# there (ci.yml runs the tests on every branch). On PRs to main only the gates
# run — they catch a forgotten version bump before the merge.
#
# The version has a single source of truth, pyproject.toml; drift against
# __init__.py and CHANGELOG.md is caught by scripts/check_version_drift.py.
# The discipline "used code changed → version bump; infrastructure only → the
# version must not change, no release" is enforced by
# scripts/check_release_gate.py.
#
# Publishing is idempotent and tied to the version bump: if release v<version>
# already exists (a merge without a bump), the step does nothing. Version
# 0.0.0 is the baseline and is never published. Release assets: a source
# archive (git archive) + its SHA256; no artifact build is needed.
#
# workflow_dispatch on main is allowed as a manual retry: the duplicate guard
# (gh release view) makes it safe.
#
# Actions are pinned by commit SHA, not by tag: tags are mutable, SHAs are not.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags — the gate needs release tags)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Version drift gate (pyproject = __init__ = CHANGELOG)
        run: python3 scripts/check_version_drift.py

      - name: Release gate (code change ⇔ version bump)
        run: python3 scripts/check_release_gate.py

  release:
    # Push/dispatch on main only; PR runs are limited to the gates.
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: gates
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the tag/Release and upload assets
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Never publish red code: the full ci.yml check set is executed once
      # more in this job right before publishing.
      - name: Validate all skills (structure + metadata)
        run: python3 scripts/validate_all.py

      - name: Run the full test suite (__test__/)
        run: python3 -m unittest discover -s __test__ -t . -v

      - name: Publish GitHub Release (on version bump)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          VER="$(python3 scripts/check_version_drift.py --print-version)"
          [ -n "$VER" ] || { echo "ERROR: version missing in pyproject.toml" >&2; exit 1; }
          TAG="v${VER}"

          # 0.0.0 is the unreleased baseline (see CHANGELOG.md).
          if [ "$VER" = "0.0.0" ]; then
            echo "Version 0.0.0 is the baseline; no release is published."
            exit 0
          fi

          # Idempotency: the release is tied to the version. If v<version>
          # already exists, this merge did not bump — publish nothing.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — version was not bumped, publishing skipped."
            exit 0
          fi

          # Assets: a reproducible source archive + its SHA256.
          # (GitHub also attaches its own "Source code" zip/tar.gz.)
          ARCHIVE="skill-library-${VER}.tar.gz"
          git archive --format=tar.gz --prefix="skill-library-${VER}/" \
            -o "$ARCHIVE" HEAD
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

          # Release notes — the current version's section of CHANGELOG.md
          # (header format: "## [X.Y.Z] — YYYY-MM-DD").
          awk -v ver="$VER" '
            BEGIN { gsub(/\./, "\\.", ver); re = "^## \\[" ver "\\]" }
            $0 ~ re { flag=1; print; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          [ -s release-notes.md ] || { echo "ERROR: no CHANGELOG.md section for $VER" >&2; exit 1; }
          {
            echo
            echo "---"
            echo "Commit: \`${GITHUB_SHA}\`"
            echo
            echo "To verify the integrity of the downloaded archive:"
            echo '```sh'
            echo "sha256sum -c ${ARCHIVE}.sha256"
            echo '```'
          } >> release-notes.md

          gh release create "$TAG" \
            "$ARCHIVE" "${ARCHIVE}.sha256" \
            --title "skill-library ${VER}" \
            --target "${GITHUB_SHA}" \
            --notes-file release-notes.md
          echo "Published release $TAG (${GITHUB_SHA}) with assets ${ARCHIVE}{,.sha256}"
