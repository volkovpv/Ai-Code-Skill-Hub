name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

# Actions are pinned by commit SHA, not by tag: tags are mutable, SHAs are not.

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.12 is the minimum supported version (requires-python = ">=3.12");
        # 3.13 proves the ">= 3.12" claim on a newer interpreter.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      # Steps on bare python (no uv, no venv) prove the library is
      # self-contained: the CLI and validation run on pure stdlib.
      - name: CLI smoke — list
        run: python scripts/skillctl.py list

      - name: CLI smoke — validate
        run: python scripts/skillctl.py validate

      - name: Validate all skills (structure + metadata)
        run: python scripts/validate_all.py

      # The test convention is stdlib unittest; pytest is only present
      # transitively (via mutmut) and must not leak into the test suite.
      - name: Enforce stdlib unittest (no pytest idioms in __test__/)
        run: |
          if grep -rn --include="*.py" -E '(^|[^[:alnum:]_])(import pytest|from pytest)' __test__; then
            echo "ERROR: pytest usage found in __test__/ — tests must use stdlib unittest" >&2
            exit 1
          fi

      - name: Install locked development tools
        run: |
          python -m pip install uv==0.11.28
          uv sync --locked

      # The full suite runs exactly once — directly under coverage: a coverage
      # run fully subsumes a plain run, so a separate plain run is redundant.
      - name: Run the full test suite with line and branch coverage
        run: |
          uv run coverage run -m unittest discover -s __test__ -t . -v
          uv run coverage report

      - name: Validate versioned eval manifests (offline)
        run: python scripts/run_skill_evals.py --validate-only __test__/evals/example-skill/cases.json

      - name: Layer smoke — knowledge/observations/data commands
        run: |
          python scripts/skillctl.py knowledge list example-skill
          python scripts/skillctl.py observation list example-skill
          python scripts/skillctl.py data validate example-skill

      - name: Lifecycle smoke — install/status/diff/update/remove (runtime + full)
        run: |
          PROJ="$(mktemp -d)"
          python scripts/skillctl.py install example-skill --target "$PROJ" --agent universal --copy --mode runtime
          test ! -e "$PROJ/.agents/skills/example-skill/observations/candidates"
          test ! -e "$PROJ/.agents/skills/example-skill/data/fixtures"
          test -f "$PROJ/.agents/skills/example-skill/knowledge/INDEX.md"
          python scripts/skillctl.py status --target "$PROJ"
          python scripts/skillctl.py diff example-skill --target "$PROJ"
          python scripts/skillctl.py update example-skill --target "$PROJ"
          python scripts/skillctl.py remove example-skill --target "$PROJ" --dry-run
          python scripts/skillctl.py remove example-skill --target "$PROJ"
          test ! -e "$PROJ/.agents/skills/example-skill"
          PROJ2="$(mktemp -d)"
          python scripts/skillctl.py install example-skill --target "$PROJ2" --agent claude --mode full
          test -f "$PROJ2/.claude/skills/example-skill/SKILL.md"
          test -f "$PROJ2/.claude/skills/example-skill/observations/candidates/OBS-20260712-002.md"
          test -f "$PROJ2/.claude/skills/example-skill/data/fixtures/mixed_change.diff"
